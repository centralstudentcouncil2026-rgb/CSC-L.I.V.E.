Place this where you want timers to appear in StudentDashboard.html
========================================================= -->

<div id="studentMatchTimers" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://unveyndaaznxgqojwjki.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVudmV5bmRhYXpueGdxb2p3amtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzQyNzUsImV4cCI6MjA5NDIxMDI3NX0.2RUriqqq9kITnl8uPZSdiSrXuo8BhD9nrzqHFUwl2yU";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const MATCHES_TABLE = "scheduled_matches";

    const studentMatchTimers = document.getElementById("studentMatchTimers");
    let studentMatches = [];

    function escapeHTML(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function formatTimerDisplay(totalSeconds) {
        const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
        const minutes = Math.floor(safeSeconds / 60);
        const seconds = safeSeconds % 60;

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function calculateRemainingSeconds(match) {
        const duration = Math.max(1, Number(match.timer_duration_seconds) || 600);

        if (!match.timer_enabled || !match.timer_started_at) {
            return duration;
        }

        const startedAt = new Date(match.timer_started_at).getTime();

        if (Number.isNaN(startedAt)) {
            return duration;
        }

        const elapsed = Math.floor((Date.now() - startedAt) / 1000);

        return Math.max(duration - elapsed, 0);
    }

    function getTeamName(match, side) {
        if (side === "one") {
            return match.team_one?.team || "Team 1";
        }

        return match.team_two?.team || "Team 2";
    }

    async function loadStudentMatchTimers() {
        const { data, error } = await supabase
            .from(MATCHES_TABLE)
            .select(`
                id,
                status,
                match_time,
                location,
                timer_enabled,
                timer_duration_seconds,
                timer_started_at,
                sport:sports!scheduled_matches_sport_id_fkey(id, sport_name),
                team_one:sports_leaderboard!scheduled_matches_team_one_fkey(team),
                team_two:sports_leaderboard!scheduled_matches_team_two_fkey(team)
            `)
            .in("status", ["Next", "Ongoing"])
            .order("match_time", { ascending: true });

        if (error) {
            console.error("Student timer load error:", error.message || error);
            studentMatchTimers.innerHTML = `
                <div class="p-4 bg-red-50 border border-red-200 rounded-lg text-red-700">
                    Failed to load match timers.
                </div>
            `;
            return;
        }

        studentMatches = data || [];
        renderStudentMatchTimers();
    }

    function renderStudentMatchTimers() {
        if (studentMatches.length === 0) {
            studentMatchTimers.innerHTML = `
                <div class="p-4 bg-white border border-gray-200 rounded-lg text-gray-600">
                    No active match timers.
                </div>
            `;
            return;
        }

        studentMatchTimers.innerHTML = "";

        studentMatches.forEach(match => {
            const remaining = calculateRemainingSeconds(match);
            const timerState = match.timer_enabled ? "Timer Running" : "Timer Not Started";
            const stateClass = match.timer_enabled
                ? "bg-green-100 text-green-800"
                : "bg-gray-100 text-gray-700";

            const card = document.createElement("div");
            card.className = "p-5 bg-white border border-gray-200 rounded-xl shadow-sm";

            card.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <span class="inline-flex px-3 py-1 rounded-full text-xs font-semibold ${stateClass}">
                        ${timerState}
                    </span>

                    <span class="text-xs text-gray-500">
                        ${escapeHTML(match.status)}
                    </span>
                </div>

                <p class="text-sm text-blue-700 font-semibold mb-2">
                    🏅 ${escapeHTML(match.sport?.sport_name || "Unknown Sport")}
                </p>

                <div class="text-center my-4">
                    <p class="text-xs uppercase tracking-wide text-gray-500 mb-1">Countdown</p>
                    <p
                        class="student-countdown text-4xl font-extrabold text-gray-900"
                        data-match-id="${match.id}"
                        data-duration-seconds="${Number(match.timer_duration_seconds) || 600}"
                        data-timer-enabled="${match.timer_enabled ? "true" : "false"}"
                        data-started-at="${match.timer_started_at || ""}">
                        ${formatTimerDisplay(remaining)}
                    </p>
                </div>

                <div class="flex items-center justify-between text-center">
                    <div class="flex-1">
                        <p class="text-xs uppercase tracking-wide text-gray-500">Team 1</p>
                        <p class="font-bold text-gray-900">${escapeHTML(getTeamName(match, "one"))}</p>
                    </div>

                    <div class="px-4 font-semibold text-gray-500">vs</div>

                    <div class="flex-1">
                        <p class="text-xs uppercase tracking-wide text-gray-500">Team 2</p>
                        <p class="font-bold text-gray-900">${escapeHTML(getTeamName(match, "two"))}</p>
                    </div>
                </div>
            `;

            studentMatchTimers.appendChild(card);
        });
    }

    function updateStudentCountdownDisplays() {
        document.querySelectorAll(".student-countdown").forEach(display => {
            const duration = Math.max(1, Number(display.dataset.durationSeconds) || 600);
            const isEnabled = display.dataset.timerEnabled === "true";
            const startedAt = display.dataset.startedAt;
            let remaining = duration;

            if (isEnabled && startedAt) {
                const startedAtMs = new Date(startedAt).getTime();

                if (!Number.isNaN(startedAtMs)) {
                    const elapsed = Math.floor((Date.now() - startedAtMs) / 1000);
                    remaining = Math.max(duration - elapsed, 0);
                }
            }

            display.textContent = formatTimerDisplay(remaining);

            if (isEnabled && remaining <= 0) {
                display.classList.add("text-red-700");
            } else {
                display.classList.remove("text-red-700");
            }
        });
    }

    await loadStudentMatchTimers();
    setInterval(updateStudentCountdownDisplays, 1000);

    supabase
        .channel("student-match-timer-realtime")
        .on(
            "postgres_changes",
            {
                event: "*",
                schema: "public",
                table: MATCHES_TABLE
            },
            loadStudentMatchTimers
        )
        .subscribe();
</script>
